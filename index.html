<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>৩ বছরের বন্ধুত্ব - আরিয়ান মামার জন্য</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Hind+Siliguri:wght@400;700&display=swap');

        :root {
            --primary: #00b894; /* Friendship Green */
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 15px 35px rgba(0, 184, 148, 0.3);
        }

        body {
            background: linear-gradient(-45deg, #55efc4, #81ecec, #74b9ff, #a29bfe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #main-card {
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: var(--shadow);
            width: 85%;
            max-width: 400px;
            z-index: 10;
        }

        #title {
            color: #2d3436;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #love-frame {
            display: none;
            width: 220px;
            height: 220px;
            margin: 20px auto;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 5px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 184, 148, 0.5);
            animation: bounceIn 1s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        #love-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cat-gif { 
            width: 160px; 
            border-radius: 15px; 
            margin: 15px 0;
        }

        .btn-container { 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
            margin-top: 25px; 
            align-items: center;
        }

        .action-btn { 
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .action-btn:hover { transform: translateY(-3px); background: #00a884; }

        .success-text {
            display: none;
            color: #2d3436;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }

        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            animation: fall 3s linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="main-card">
    <h1 id="title">আরিয়ান মামা! <br> আমাদের বন্ধুত্বের ৩ বছর...</h1>
    
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lM8A5pBAH7U5W0/giphy.gif" 
         class="cat-gif" id="display-gif">

    <div id="love-frame">
        <img src="./1000426673.jpg" onerror="this.src='https://via.placeholder.com/200?text=Photo+Error'">
    </div>

    <div class="btn-container" id="btns">
        <button class="action-btn" onclick="celebrate()">সারপ্রাইজটি দেখুন</button>
    </div>

    <p id="success-msg" class="success-text">আরিয়ান মামা, তুমি শুধু মামাই না,<br>তুমি আমার সেরা বন্ধু! 🤝✨</p>
</div>

<script>
    function celebrate() {
        document.getElementById('title').innerText = "Happy 3 Years, Aryan Mama!";
        document.getElementById('display-gif').style.display = 'none';
        document.getElementById('btns').style.display = 'none';
        document.getElementById('love-frame').style.display = 'block';
        document.getElementById('success-msg').style.display = 'block';

        setInterval(createConfetti, 100);
        speak();
    }

    function speak() {
        const synth = window.speechSynthesis;
        const text = "আসসালামু আলাইকুম আরিয়ান মামা। আমাদের বন্ধুত্বের ৩ বছর পূর্ণ হলো। তুমি আমার জন্য শুধু মামাই নও, তুমি আমার জীবনের সেরা বন্ধু। এই বন্ধুত্ব যেন সারা জীবন টিকে থাকে।";
        const utter = new SpeechSynthesisUtterance(text);
        
        utter.lang = 'bn-BD'; 
        utter.rate = 0.9;
        utter.pitch = 1.0;

        synth.speak(utter);
    }

    function createConfetti() {
        const c = document.createElement('div');
        c.classList.add('confetti');
        c.innerText = ["🤝", "✨", "🔥", "💫", "🌟"][Math.floor(Math.random() * 5)];
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-5vh";
        c.style.fontSize = (Math.random() * 20 + 10) + "px";
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
    }
</script>

</body>
</html>
